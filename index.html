<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aditya Raj</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0d1117;
            color: #c9d1d9;
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .wrapper {
            padding: 20px;
        }
        h1 {
            color: #fff;
            font-size: 2.5rem;
            margin: 0 0 10px 0;
            font-weight: 600;
        }
        p {
            color: #8b949e;
            font-size: 1.1rem;
            margin: 0 0 30px 0;
        }
        /* Simple clean loading line */
        .loader-bar {
            width: 150px;
            height: 3px;
            background-color: #21262d;
            border-radius: 2px;
            margin: 0 auto;
            position: relative;
            overflow: hidden;
        }
        .loader-bar::after {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 40px;
            background-color: #58a6ff;
            border-radius: 2px;
            animation: shift 1.8s infinite linear;
        }
        @keyframes shift {
            0% { left: -40px; }
            100% { left: 150px; }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <h1>Aditya Raj</h1>
    <p>Site under construction. Back in a few weeks.</p>
    <div class="loader-bar"></div>
</div>
</body>
</html>
